<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FamilyHub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-color: var(--tg-theme-bg-color, #ffffff); 
            color: var(--tg-theme-text-color, #222222); 
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .glass { 
            background: rgba(0, 0, 0, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(0, 0, 0, 0.08); 
        }
        .active-nav { color: #2563eb !important; border-top: 2px solid #2563eb; }
    </style>
</head>
<body class="font-sans pb-24">

    <header class="p-4 flex justify-between items-center glass sticky top-0 z-50">
        <h1 class="text-xl font-bold text-blue-600">FamilyHub</h1>
        <div id="status-dot" class="flex items-center gap-1 text-[10px] uppercase tracking-widest text-green-500">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Online
        </div>
    </header>

    <main id="tab-profile" class="tab-content active p-4 space-y-4">
        <div class="glass p-6 rounded-3xl shadow-sm">
            <h2 class="text-lg font-bold mb-5 flex items-center gap-2">
                <i class="fa-solid fa-address-card text-blue-500"></i> Ваша Анкета
            </h2>
            <div class="space-y-4">
                <input id="pair_name" type="text" placeholder="Имена (напр. Арман и Алия)" class="w-full p-4 rounded-2xl bg-white/50 border border-gray-200 outline-none focus:border-blue-500">
                <input id="city" type="text" placeholder="Ваш город" class="w-full p-4 rounded-2xl bg-white/50 border border-gray-200 outline-none focus:border-blue-500">
                <textarea id="about" placeholder="О вашей семье..." class="w-full p-4 rounded-2xl bg-white/50 border border-gray-200 h-28 outline-none focus:border-blue-500"></textarea>
            </div>
            <button onclick="saveProfile()" class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                Сохранить анкету
            </button>
        </div>
    </main>

    <main id="tab-feed" class="tab-content p-4 space-y-4">
        <div class="flex justify-between items-center px-2">
            <h2 class="text-lg font-bold">Лента встреч</h2>
            <button onclick="loadEvents()" class="p-2 text-blue-500"><i class="fa-solid fa-arrows-rotate"></i></button>
        </div>
        <div id="events-list" class="space-y-4">
            <div class="text-center py-20 opacity-30 italic">Нажмите обновить...</div>
        </div>
    </main>

    <main id="tab-create" class="tab-content p-4">
        <div class="glass p-6 rounded-3xl border border-green-500/20 shadow-sm">
            <h2 class="text-lg font-bold mb-5">➕ Новое событие</h2>
            <div class="space-y-4">
                <input id="ev_title" type="text" placeholder="Название встречи" class="w-full p-4 rounded-2xl border outline-none focus:border-green-500">
                <textarea id="ev_desc" placeholder="Описание встречи..." class="w-full p-4 rounded-2xl border h-32 outline-none focus:border-green-500"></textarea>
            </div>
            <button onclick="createEvent()" class="w-full mt-8 bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                Опубликовать
            </button>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass border-t flex justify-around py-3 z-50">
        <button onclick="switchTab('profile')" id="btn-profile" class="flex flex-col items-center gap-1 active-nav px-4">
            <i class="fa-solid fa-circle-user text-xl"></i><span class="text-[9px] font-bold uppercase">Анкета</span>
        </button>
        <button onclick="switchTab('feed')" id="btn-feed" class="flex flex-col items-center gap-1 text-gray-400 px-4">
            <i class="fa-solid fa-compass text-xl"></i><span class="text-[9px] font-bold uppercase">Лента</span>
        </button>
        <button onclick="switchTab('create')" id="btn-create" class="flex flex-col items-center gap-1 text-gray-400 px-4">
            <i class="fa-solid fa-plus-circle text-xl"></i><span class="text-[9px] font-bold uppercase">Создать</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Ссылка на твой туннель
        const API_URL = "https://floppy-ravens-yell.loca.lt";
        const userId = tg.initDataUnsafe.user?.id || 0;

        // Загрузка профиля
        async function loadProfile() {
            try {
                const res = await fetch(`${API_URL}/get_profile/${userId}`);
                if (!res.ok) throw new Error('Profile not found');
                const data = await res.json();
                if (data.pair_name) {
                    document.getElementById('pair_name').value = data.pair_name;
                    document.getElementById('city').value = data.city;
                    document.getElementById('about').value = data.about_us;
                }
            } catch (e) { console.log("User new or offline"); }
        }

        // Сохранение профиля
        async function saveProfile() {
            const data = {
                user_id: userId,
                pair_name: document.getElementById('pair_name').value,
                city: document.getElementById('city').value,
                about_us: document.getElementById('about').value
            };
            
            if (!data.pair_name || !data.city) return tg.showAlert("Заполните Имя и Город!");

            try {
                const res = await fetch(`${API_URL}/save_profile`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    tg.HapticFeedback.notificationOccurred('success');
                    tg.showAlert("✅ Анкета сохранена!");
                } else {
                    tg.showAlert("❌ Сервер отклонил запрос");
                }
            } catch (e) { 
                tg.showAlert("❌ Ошибка: " + e.message); 
            }
        }

        // Лента
        async function loadEvents() {
            const city = document.getElementById('city').value || "Алматы";
            const list = document.getElementById('events-list');
            list.innerHTML = "Загрузка...";

            try {
                const res = await fetch(`${API_URL}/get_events/${encodeURIComponent(city)}`);
                const events = await res.json();
                list.innerHTML = "";
                
                if (events.length === 0) {
                    list.innerHTML = `<div class="p-10 text-center opacity-50">В городе ${city} нет встреч.</div>`;
                    return;
                }

                events.forEach(ev => {
                    const card = document.createElement('div');
                    card.className = "glass p-5 rounded-3xl border border-gray-100 shadow-sm mb-4";
                    card.innerHTML = `
                        <h3 class="font-bold text-blue-600 text-lg">${ev.title}</h3>
                        <p class="text-[11px] text-gray-400 mb-2">Семья: ${ev.pair_name}</p>
                        <p class="text-sm text-gray-600 mb-4">${ev.description}</p>
                        <button onclick="joinEvent(${ev.id})" class="w-full bg-blue-600 text-white text-xs font-bold py-3 rounded-2xl active:scale-95 transition-all">Присоединиться</button>
                    `;
                    list.appendChild(card);
                });
            } catch (e) { list.innerHTML = "Ошибка загрузки ленты."; }
        }

        // Создать встречу
        async function createEvent() {
            const data = {
                user_id: userId,
                title: document.getElementById('ev_title').value,
                description: document.getElementById('ev_desc').value,
                city: document.getElementById('city').value
            };

            try {
                const res = await fetch(`${API_URL}/create_event`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    tg.showAlert("🚀 Встреча создана!");
                    switchTab('feed');
                }
            } catch (e) { tg.showAlert("Ошибка при создании"); }
        }

        async function joinEvent(eventId) {
            try {
                const res = await fetch(`${API_URL}/join_request`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ event_id: eventId, user_id: userId })
                });
                if (res.ok) tg.showAlert("📨 Заявка отправлена автору!");
            } catch (e) { tg.showAlert("Ошибка API"); }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('active-nav');
                b.classList.add('text-gray-400');
            });
            document.getElementById('btn-' + tabId).classList.add('active-nav');
            if (tabId === 'feed') loadEvents();
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
