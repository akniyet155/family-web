<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета Семьи</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-md p-6">
        <h2 class="text-xl font-bold text-center mb-6 text-gray-800">Наша Анкета</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Как вас зовут?</label>
                <input type="text" id="pair_name" class="w-full border rounded-lg p-2" placeholder="Дамир и Алия">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Город</label>
                <input type="text" id="city" class="w-full border rounded-lg p-2" placeholder="Алматы">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Интересы</label>
                <input type="text" id="interests" class="w-full border rounded-lg p-2" placeholder="Кино, прогулки">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">О нас</label>
                <textarea id="about" class="w-full border rounded-lg p-2 h-24" placeholder="Пару слов о вашей семье"></textarea>
            </div>

            <button onclick="save()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">
                Сохранить
            </button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function save() {
            let data = {
                pair_name: document.getElementById('pair_name').value,
                city: document.getElementById('city').value,
                interests: document.getElementById('interests').value,
                about_us: document.getElementById('about').value
            };

            if (!data.pair_name || !data.city) {
                alert("Заполните хотя бы имена и город!");
                return;
            }

            // Прямая отправка данных в бот
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
