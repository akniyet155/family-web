<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 p-5">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6">
        <h1 class="text-2xl font-bold mb-4 text-center">Профиль Пары</h1>
        <p class="text-sm text-gray-600 mb-6 text-center">Заполните данные вашей семьи</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium">Название пары</label>
                <input type="text" id="pair_name" placeholder="Например: Дамир и Алия" 
                       class="w-full border rounded-lg p-2 mt-1 focus:ring-2 focus:ring-blue-500">
            </div>
            
            <button onclick="sendData()" 
                    class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                Сохранить данные
            </button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function sendData() {
            let name = document.getElementById('pair_name').value;
            if (!name) {
                alert("Введите название!");
                return;
            }
            // Отправляем данные обратно в бота
            tg.sendData(JSON.stringify({pair_name: name}));
            tg.close();
        }
    </script>
</body>
</html>
