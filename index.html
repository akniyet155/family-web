<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FamilyHub App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-color: var(--tg-theme-bg-color, #ffffff); 
            color: var(--tg-theme-text-color, #222222); 
        }
        .active-tab { color: #3b82f6 !important; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
    </style>
</head>
<body class="font-sans pb-24">

    <header class="p-4 flex justify-between items-center glass sticky top-0 z-50">
        <h1 class="text-xl font-bold text-blue-500">FamilyHub</h1>
        <div id="user-name" class="text-sm font-medium opacity-80"></div>
    </header>

    <main id="tab-home" class="tab-content active p-4 space-y-4">
        <div class="glass p-5 rounded-2xl shadow-xl border border-blue-500/20">
            <h2 id="header-title" class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-user-pen text-blue-500"></i> Ваша Анкета
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-semibold opacity-50 ml-1 uppercase">Как вас зовут?</label>
                    <input id="pair_name" type="text" placeholder="Напр: Дамир и Алия" class="w-full p-4 mt-1 rounded-xl bg-black/5 border border-white/10 outline-none focus:border-blue-500 transition-all">
                </div>
                <div>
                    <label class="text-xs font-semibold opacity-50 ml-1 uppercase">Город</label>
                    <input id="city" type="text" placeholder="Ваш город" class="w-full p-4 mt-1 rounded-xl bg-black/5 border border-white/10 outline-none focus:border-blue-500 transition-all">
                </div>
                <div>
                    <label class="text-xs font-semibold opacity-50 ml-1 uppercase">О нас</label>
                    <textarea id="about" placeholder="Расскажите о себе..." class="w-full p-4 mt-1 rounded-xl bg-black/5 border border-white/10 h-28 outline-none focus:border-blue-500 transition-all"></textarea>
                </div>
            </div>
            <button onclick="sendDataToBot()" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition-all">
                Сохранить изменения
            </button>
        </div>
    </main>

    <main id="tab-feed" class="tab-content p-4 text-center py-20">
        <i class="fa-solid fa-layer-group text-6xl text-gray-400 mb-4 opacity-20"></i>
        <h2 class="text-xl font-bold">Лента встреч</h2>
        <p class="text-gray-400 mt-2 px-6">Здесь появятся предложения из вашего города.</p>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 px-6 py-3 flex justify-between items-center z-50">
        <button onclick="switchTab('home')" id="btn-home" class="flex flex-col items-center gap-1 active-tab">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-medium">Главная</span>
        </button>
        <button onclick="switchTab('feed')" id="btn-feed" class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] font-medium">Лента</span>
        </button>
    </nav>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // 1. Извлекаем данные из URL (которые прислал бот)
        const urlParams = new URLSearchParams(window.location.search);
        const name = decodeURIComponent(urlParams.get('name') || "");
        const city = decodeURIComponent(urlParams.get('city') || "");
        const about = decodeURIComponent(urlParams.get('about') || "");

        // 2. Подставляем данные в поля при загрузке
        window.onload = () => {
            if (name) {
                document.getElementById('pair_name').value = name;
                document.getElementById('header-title').innerText = "Семья: " + name;
            }
            if (city) document.getElementById('city').value = city;
            if (about) document.getElementById('about').value = about;
            
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user?.first_name || "Пользователь";
        };

        // 3. Функция отправки данных боту
        function sendDataToBot() {
            const data = {
                pair_name: document.getElementById('pair_name').value,
                city: document.getElementById('city').value,
                about_us: document.getElementById('about').value
            };

            if (!data.pair_name || !data.city) {
                tg.showAlert("Заполните Имена и Город!");
                return;
            }

            tg.HapticFeedback.notificationOccurred('success');
            tg.sendData(JSON.stringify(data));
        }

        // Переключение вкладок
        function switchTab(tabId) {
            tg.HapticFeedback.impactOccurred('light');
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            document.querySelectorAll('nav button').forEach(el => {
                el.classList.remove('active-tab', 'text-blue-500');
                el.classList.add('text-gray-500');
            });
            document.getElementById('btn-' + tabId).classList.add('active-tab', 'text-blue-500');
        }
    </script>
</body>
</html>
